# web/ 변경이 main에 푸시되면 Firebase Hosting 자동 배포
name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "firebase.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 의존성 설치 및 빌드
        working-directory: web
        run: |
          npm ci
          npm run build
        env:
          # Firebase 웹 SDK 설정은 공개 값 (보안은 Firestore 규칙이 담당)
          VITE_FIREBASE_API_KEY: AIzaSyDbyLAPYkGuiOGNxJOBE4cTgqxaeX2fn5o
          VITE_FIREBASE_AUTH_DOMAIN: quick-clipper.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: quick-clipper
          VITE_FIREBASE_STORAGE_BUCKET: quick-clipper.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "18667269345"
          VITE_FIREBASE_APP_ID: 1:18667269345:web:eb9c3ec644bbce3e3c1ba0

      - name: Hosting 배포
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: quick-clipper
          channelId: live
