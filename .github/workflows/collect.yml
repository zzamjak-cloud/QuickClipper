# 매일 아침 다이제스트 수집 — GitHub 크론은 정각·30분 등 혼잡 시간대에 지연/누락이 잦아
# 어중간한 분(:50/:20)으로 앞당겨 잡고, 지연돼도 06:30 KST 전에 데이터가 준비되게 한다.
name: Daily Collect

on:
  schedule:
    - cron: "50 20 * * *" # 05:50 KST
    - cron: "20 21 * * *" # 06:20 KST 백업
    - cron: "50 21 * * *" # 06:50 KST 백업
  workflow_dispatch:
    inputs:
      force:
        description: 기존 다이제스트가 있어도 재수집
        type: boolean
        default: false
      skip_ai:
        description: 번역·브리핑 AI 부가기능 건너뛰기
        type: boolean
        default: false

concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: collector
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: collector/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 수집 실행
        run: npm run collect
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # 미설정 시 해당 타입 소스는 자동으로 건너뜀
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # 영문 항목 배치 번역용 (미설정 시 원문 저장)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_COLLECT: ${{ github.event_name == 'workflow_dispatch' && inputs.force && '1' || '' }}
          SKIP_AI_EXTRAS: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_ai && '1' || '' }}
